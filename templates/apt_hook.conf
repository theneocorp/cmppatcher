// cmppatcher — APT post-invoke hook
// Re-applies NVIDIA driver patches after any dpkg operation that touches
// nvidia packages (driver update, DKMS rebuild, etc.)
DPkg::Post-Invoke {
    "test -x /etc/cmppatcher/repatch.sh && /etc/cmppatcher/repatch.sh --auto 2>&1 | logger -t cmppatcher || true";
};
